<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The View Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  margin:0;
  font-family: Inter, sans-serif;
  background:#f4f6f9;
}

/* LAYOUT */
.container {
  display:flex;
}

.sidebar {
  width:260px;
  background:#1a2a44;
  color:white;
  padding:20px;
  height:100vh;
}

.sidebar h2 {
  margin-bottom:30px;
}

.sidebar label {
  font-size:12px;
  opacity:0.7;
}

.sidebar input {
  width:100%;
  margin-bottom:15px;
  padding:6px;
  border-radius:6px;
  border:none;
}

/* MAIN */
.main {
  flex:1;
  padding:30px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
}

/* CARD */
.card {
  background:white;
  padding:18px;
  border-radius:16px;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
  cursor:pointer;
}

.card:hover {
  transform:translateY(-3px);
}

.badge {
  background:#edf2f7;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}

.price {
  font-size:22px;
  font-weight:600;
}

.small {
  font-size:13px;
  color:#718096;
}

.up { color:#e53e3e; }
.down { color:#38a169; }

/* MODAL */
.modal {
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
}

.modal-box {
  background:white;
  width:700px;
  margin:50px auto;
  padding:20px;
  border-radius:12px;
  max-height:80vh;
  overflow-y:auto;
}

.section {
  margin-top:10px;
  background:#f7f8fa;
  padding:10px;
  border-radius:8px;
}

.comp {
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>⚙️ Config</h2>

    <label>Diretos - Piso</label>
    <input type="number" id="cfg_direto_piso" value="0">

    <label>Diretos - Mesma Vista</label>
    <input type="checkbox" id="cfg_direto_vista" checked>

    <label>Indiretos - Piso</label>
    <input type="number" id="cfg_indireto_piso" value="0">

    <label>Pouco - Piso</label>
    <input type="number" id="cfg_pouco_piso" value="1">

    <button onclick="render()">Atualizar</button>
  </div>

  <!-- MAIN -->
  <div class="main">
    <h1>The View Dashboard</h1>
    <div class="grid" id="grid"></div>
  </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;">
      <h3 id="modalTitulo"></h3>
      <button onclick="fecharModal()">X</button>
    </div>
    <div id="modalConteudo"></div>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
