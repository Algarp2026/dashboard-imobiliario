<!DOCTYPE html>
<html>
<head>
  <title>The View — Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body { font-family: Arial; margin: 20px; background: #f5f6fa; }

    h1 { margin-bottom: 5px; }
    h2 { color: #555; font-weight: normal; margin-top: 0; }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }

    th {
      background: #fafafa;
      font-weight: bold;
    }

    .green { color: #27ae60; }
    .red { color: #e74c3c; }

    .btn {
      padding: 5px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      cursor: pointer;
      background: #fff;
    }
  </style>
</head>

<body>

<h1>The View — Dashboard Competitivo</h1>
<h2>Análise dinâmica de concorrência imobiliária</h2>

<div class="container">
  <table>
    <thead>
      <tr>
        <th>Fração</th>
        <th>Piso</th>
        <th>Tipologia</th>
        <th>Vista</th>
        <th>PVP (€)</th>
        <th>Médio Direto (€)</th>
        <th>Dif. Direto</th>
        <th>Médio Indireto (€)</th>
        <th>Dif. Indireto</th>
        <th>Ação</th>
      </tr>
    </thead>
    <tbody id="tabela"></tbody>
  </table>
</div>

<script src="app.js"></script>
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
  <div style="background:white; width:600px; margin:50px auto; padding:20px; border-radius:10px; max-height:80%; overflow:auto;">
    
    <div style="display:flex; justify-content:space-between;">
      <h3 id="modalTitulo"></h3>
      <button onclick="fecharModal()">X</button>
    </div>

    <div id="modalConteudo"></div>

  </div>
</div>
</body>
</html>
