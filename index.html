<!DOCTYPE html>
<html>
<head>
  <title>The View Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 20px;
    }

    h1 { margin-bottom: 5px; }
    h2 { color: #777; font-weight: normal; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-3px);
    }

    .price {
      font-size: 20px;
      font-weight: bold;
      margin: 10px 0;
    }

    .green { color: #27ae60; }
    .red { color: #e74c3c; }

    .btn {
      margin-top: 10px;
      padding: 8px;
      border: none;
      background: #3498db;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
    }

    /* MODAL */
    #modal {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.5);
    }

    .modal-box {
      background:white;
      width:700px;
      margin:50px auto;
      padding:20px;
      border-radius:12px;
      max-height:80%;
      overflow:auto;
    }

    .section {
      margin-top: 15px;
      padding: 10px;
      border-radius: 8px;
      background: #fafafa;
    }

    .comp {
      display:flex;
      justify-content:space-between;
      padding:5px 0;
      border-bottom:1px solid #eee;
    }
  </style>
</head>

<body>

<h1>The View</h1>
<h2>Dashboard Competitivo</h2>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div id="modal">
  <div class="modal-box">
    <div style="display:flex; justify-content:space-between;">
      <h3 id="modalTitulo"></h3>
      <button onclick="fecharModal()">X</button>
    </div>

    <div id="modalConteudo"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
