<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The View Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  margin:0;
  font-family: Inter, sans-serif;
  background:#f4f6f9;
}

.container { display:flex; }

/* SIDEBAR */
.sidebar {
  width:260px;
  background:#1a2a44;
  color:white;
  padding:20px;
  height:100vh;
  overflow:auto;
}

.sidebar h3 { margin-top:20px; }

.sidebar select {
  width:100%;
  padding:6px;
  border-radius:6px;
  margin-bottom:10px;
}

/* MAIN */
.main {
  flex:1;
  padding:30px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
}

/* CARD */
.card {
  background:white;
  padding:18px;
  border-radius:16px;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
  cursor:pointer;
}

.badge {
  background:#edf2f7;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}

.price {
  font-size:22px;
  font-weight:600;
}

.small {
  font-size:13px;
  color:#718096;
}

.up { color:#e53e3e; }
.down { color:#38a169; }

/* MODAL */
.modal {
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
}

.modal-box {
  background:white;
  width:720px;
  margin:40px auto;
  padding:20px;
  border-radius:12px;
  max-height:85vh;
  overflow-y:auto;
}

.section {
  margin-top:10px;
  background:#f7f8fa;
  padding:10px;
  border-radius:8px;
}

.section-header {
  font-weight:600;
  cursor:pointer;
}

.hidden { display:none; }

.comp {
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">

  <h2>Filtros</h2>

  <h3>Piso</h3>
  <select id="piso" onchange="render()"></select>

  <h3>Vista</h3>
  <select id="vista" onchange="render()"></select>

  <h3>Frações</h3>
  <select id="manual" multiple onchange="render()"></select>

  <h3>Empreendimentos</h3>
  <select id="empre" multiple onchange="render()"></select>

</div>

<div class="main">
  <h1>The View Dashboard</h1>
  <div class="grid" id="grid"></div>
</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;">
      <h3 id="modalTitulo"></h3>
      <button onclick="fecharModal()">X</button>
    </div>
    <div id="modalConteudo"></div>
  </div>
</div>

<!-- MODAL CONCORRENTE -->
<div id="modalConc" class="modal">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;">
      <h3 id="concTitulo"></h3>
      <button onclick="fecharConc()">X</button>
    </div>
    <div id="concConteudo"></div>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
