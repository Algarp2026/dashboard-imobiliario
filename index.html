<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>The View Dashboard</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- XLSX -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>

  <!-- HERO -->
  <header class="hero">
    <div class="hero-overlay">
      <h1>The View</h1>
      <p>Dashboard competitivo imobiliário</p>
    </div>
  </header>

  <!-- CONTAINER -->
  <div class="container">

    <!-- FILTROS -->
    <div class="filtros">

      <div class="filtro">
        <label>Piso</label>
        <select id="piso" onchange="render()"></select>
      </div>

      <div class="filtro">
        <label>Vista</label>
        <select id="vista" onchange="render()"></select>
      </div>

      <div class="filtro">
        <label>Frações</label>
        <div id="fractionsBox" class="checkboxGroup"></div>
      </div>

      <div class="filtro">
        <label>Concorrentes</label>
        <div id="empreBox" class="checkboxGroup"></div>
      </div>

      <div class="filtro">
        <button onclick="resetFiltros()" class="btnReset">
          Limpar Filtros
        </button>
      </div>

    </div>

    <!-- GRID -->
    <div id="grid" class="grid"></div>

  </div>

  <!-- MODAL -->
  <div id="modal" class="modal" onclick="fecharModal()">
    <div class="modal-content" onclick="event.stopPropagation()">

      <div class="modalHeader">
        <h2 id="modalTitulo"></h2>
        <button onclick="fecharModal()" style="border:none;background:none;font-size:18px;cursor:pointer;">
          ✕
        </button>
      </div>

      <div id="modalConteudo"></div>

    </div>
  </div>

  <!-- SCRIPT -->
  <script src="app.js"></script>

</body>
</html>
