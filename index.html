<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The View Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: Inter, Arial;
  margin: 0;
  background: #f8f9fb;
}

/* HEADER */
.header {
  background: #1a2a44;
  color: white;
  padding: 40px;
  text-align: center;
}

/* GRID */
.grid {
  max-width:1100px;
  margin:auto;
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card {
  background:white;
  padding:18px;
  border-radius:16px;
  box-shadow:0 6px 20px rgba(0,0,0,0.06);
  cursor:pointer;
}

.price {
  font-size:22px;
  font-weight:bold;
}

/* MODAL */
#modal, #modalConc {
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.4);
}

.modal-box {
  background:white;
  width:700px;
  margin:60px auto;
  padding:20px;
  border-radius:12px;
  max-height:80vh;
  overflow:auto;
}

.section {
  margin-top:10px;
  background:#f7f8fa;
  padding:10px;
  border-radius:8px;
}

.comp {
  display:flex;
  justify-content:space-between;
  cursor:pointer;
  padding:5px 0;
}
</style>
</head>

<body>

<div class="header">
  <h1>The View — Dashboard</h1>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL PRINCIPAL -->
<div id="modal">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;">
      <h3 id="modalTitulo"></h3>
      <button onclick="fecharModal()">X</button>
    </div>
    <div id="modalConteudo"></div>
  </div>
</div>

<!-- MODAL CONCORRENTE -->
<div id="modalConc">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;">
      <h3 id="concTitulo"></h3>
      <button onclick="fecharConc()">X</button>
    </div>
    <div id="concConteudo"></div>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
