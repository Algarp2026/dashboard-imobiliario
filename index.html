<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>The View Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
  font-family:Arial;
  background:#f5f7fb;
  margin:0;
}

header{
  background:#1e3a5f;
  color:white;
  padding:20px;
}

.container{
  padding:20px;
}

.filtros{
  display:flex;
  gap:15px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:white;
  border-radius:10px;
  padding:15px;
  cursor:pointer;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card:hover{
  transform:scale(1.02);
}

.price{
  font-size:20px;
  font-weight:bold;
  margin-top:10px;
}

.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
}

.modal-content{
  background:white;
  padding:20px;
  width:400px;
  margin:5% auto;
  border-radius:10px;
  max-height:80vh;
  overflow:auto;
}

.up{color:red;}
.down{color:green;}

.section{
  margin-top:10px;
}

.section-header{
  cursor:pointer;
  font-weight:bold;
}

</style>
</head>

<body>

<header>
  <h2>The View Dashboard</h2>
</header>

<div class="container">

  <div class="filtros">
    <select id="piso" onchange="render()"></select>
    <select id="vista" onchange="render()"></select>
    <button onclick="resetFiltros()">Limpar</button>
  </div>

  <div id="grid" class="grid"></div>

</div>

<div id="modal" class="modal" onclick="fecharModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h3 id="modalTitulo"></h3>
    <div id="modalConteudo"></div>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
