<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The View Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  margin:0;
  font-family: Inter, sans-serif;
  background:#f4f6f9;
}

.container {
  display:flex;
}

.sidebar {
  width:260px;
  background:#1a2a44;
  color:white;
  padding:20px;
  height:100vh;
}

.main {
  flex:1;
  padding:30px;
}

/* FILTROS */
.filters {
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

select {
  padding:6px;
  border-radius:6px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
}

/* CARD */
.card {
  background:white;
  padding:18px;
  border-radius:16px;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
  cursor:pointer;
}

.badge {
  background:#edf2f7;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}

.price {
  font-size:22px;
  font-weight:600;
}

.small {
  font-size:13px;
  color:#718096;
}

.up { color:#e53e3e; }
.down { color:#38a169; }

/* MODAL */
.modal {
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
}

.modal-box {
  background:white;
  width:700px;
  margin:50px auto;
  padding:20px;
  border-radius:12px;
  max-height:80vh;
  overflow-y:auto;
}

.section {
  margin-top:10px;
  background:#f7f8fa;
  padding:10px;
  border-radius:8px;
}

.section-header {
  font-weight:600;
  cursor:pointer;
}

.hidden { display:none; }

.comp {
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h2>The View</h2>
    <p>Dashboard Competitivo</p>
  </div>

  <div class="main">
    <h1>Frações</h1>

    <div class="filters">
      <select id="modo" onchange="render()">
        <option value="todos">Todos</option>
        <option value="piso">Por Piso</option>
        <option value="vista">Por Vista</option>
        <option value="manual">Selecionar</option>
      </select>

      <select id="piso" onchange="render()"></select>
      <select id="vista" onchange="render()"></select>

      <select id="manual" multiple style="display:none;" onchange="render()"></select>
    </div>

    <div class="grid" id="grid"></div>
  </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;">
      <h3 id="modalTitulo"></h3>
      <button onclick="fecharModal()">X</button>
    </div>
    <div id="modalConteudo"></div>
  </div>
</div>

<!-- MODAL CONCORRENTE -->
<div id="modalConc" class="modal">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;">
      <h3 id="concTitulo"></h3>
      <button onclick="fecharConc()">X</button>
    </div>
    <div id="concConteudo"></div>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
