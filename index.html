<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The View Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: Inter, Arial;
  margin: 0;
  background: #f8f9fb;
  color: #2d3748;
}

/* HEADER */
.header {
  background: #1a2a44;
  color: white;
  padding: 40px 20px;
  text-align: center;
}

.header h1 { margin: 0; font-weight: 500; }
.header p { opacity: 0.7; }

/* FILTROS */
.filters {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:20px;
}

.filter-btn {
  padding:8px 16px;
  border-radius:20px;
  border:1px solid #ddd;
  background:white;
  cursor:pointer;
}

.filter-btn.active {
  background:#1a2a44;
  color:white;
}

/* SELECT / CHECKBOX */
.select-box {
  text-align:center;
  margin-bottom:20px;
}

.checkbox-group {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

.checkbox-item {
  background:white;
  padding:8px 12px;
  border-radius:10px;
  border:1px solid #ddd;
}

/* GRID */
.grid {
  max-width:1100px;
  margin:auto;
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card {
  background:white;
  padding:18px;
  border-radius:16px;
  box-shadow:0 6px 20px rgba(0,0,0,0.06);
  cursor:pointer;
}

.badge {
  background:#edf2f7;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}

.price {
  font-size:24px;
  font-weight:600;
  margin:10px 0;
}

.small {
  font-size:13px;
  color:#718096;
}

.up { color:#e53e3e; }
.down { color:#38a169; }

.btn {
  margin-top:10px;
  padding:8px;
  width:100%;
  background:#1a2a44;
  color:white;
  border:none;
  border-radius:8px;
}

/* MODAL */
#modal {
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.4);
}

.modal-box {
  background:white;
  width:700px;
  margin:60px auto;
  padding:20px;
  border-radius:12px;
  max-height:80vh;
  overflow-y:auto;
}

/* SECTIONS */
.section {
  margin-top:15px;
  background:#f7f8fa;
  padding:10px;
  border-radius:8px;
}

.section-header {
  display:flex;
  justify-content:space-between;
  cursor:pointer;
  font-weight:600;
}

.section-content {
  margin-top:8px;
}

.hidden {
  display:none;
}

.comp {
  display:flex;
  justify-content:space-between;
  padding:6px 0;
}
</style>
</head>

<body>

<div class="header">
  <h1>The View — Dashboard</h1>
  <p>Análise inteligente de preços</p>
</div>

<div class="filters">
  <button class="filter-btn" onclick="setMode('todos')">Todos</button>
  <button class="filter-btn" onclick="setMode('piso')">Piso</button>
  <button class="filter-btn" onclick="setMode('vista')">Vista</button>
  <button class="filter-btn" onclick="setMode('um')">Selecionar</button>
</div>

<div class="select-box" id="selectBox"></div>

<div class="grid" id="grid"></div>

<div id="modal">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;">
      <h3 id="modalTitulo"></h3>
      <button onclick="fecharModal()">X</button>
    </div>
    <div id="modalConteudo"></div>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
