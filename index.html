<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The View Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: Inter, Arial;
  margin: 0;
  background: #f5f7fa;
  color: #2d3748;
}

/* HEADER */
.header {
  background: linear-gradient(135deg,#1a2a44,#243b63);
  color: white;
  padding: 50px;
  text-align: center;
}

/* FILTROS */
.filters {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:20px;
}

.filter-btn {
  padding:8px 16px;
  border-radius:20px;
  border:1px solid #ddd;
  background:white;
  cursor:pointer;
}

.filter-btn:hover,
.filter-btn.active {
  background:#1a2a44;
  color:white;
}

/* SELECT */
.select-box {
  text-align:center;
  margin-bottom:20px;
}

/* GRID */
.grid {
  max-width:1100px;
  margin:auto;
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card {
  background:white;
  padding:20px;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(0,0,0,0.06);
  cursor:pointer;
  transition:0.2s;
}

.card:hover {
  transform:translateY(-4px);
}

.badge {
  background:#edf2f7;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}

.price {
  font-size:24px;
  font-weight:600;
  margin:10px 0;
}

.small {
  font-size:13px;
  color:#718096;
}

.up { color:#e53e3e; }
.down { color:#38a169; }

/* MODAL */
#modal, #modalConc {
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
}

.modal-box {
  background:white;
  width:700px;
  margin:60px auto;
  padding:20px;
  border-radius:12px;
  max-height:80vh;
  overflow-y:auto;
}

/* SECTIONS */
.section {
  margin-top:15px;
  background:#f7f8fa;
  padding:10px;
  border-radius:8px;
}

.section-header {
  cursor:pointer;
  font-weight:600;
}

.section-content { margin-top:8px; }
.hidden { display:none; }

.comp {
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <h1>The View — Dashboard</h1>
  <p>Análise de posicionamento de preço</p>
</div>

<div class="filters">
  <button onclick="setMode('todos')">Todos</button>
  <button onclick="setMode('piso')">Piso</button>
  <button onclick="setMode('vista')">Vista</button>
  <button onclick="setMode('um')">Selecionar</button>
</div>

<div class="select-box" id="selectBox"></div>
<div class="grid" id="grid"></div>

<!-- MODAL -->
<div id="modal">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;">
      <h3 id="modalTitulo"></h3>
      <button onclick="fecharModal()">X</button>
    </div>
    <div id="modalConteudo"></div>
  </div>
</div>

<!-- MODAL CONCORRENTE -->
<div id="modalConc">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;">
      <h3 id="concTitulo"></h3>
      <button onclick="fecharConc()">X</button>
    </div>
    <div id="concConteudo"></div>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
