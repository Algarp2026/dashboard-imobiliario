<!DOCTYPE html>
<html lang="pt">
<header class="hero">
  <div class="hero-overlay">
    <h1>The View</h1>
    <p>Dashboard competitivo imobiliário</p>
  </div>
</header>

<body>

  <!-- HEADER -->
  <header class="header">
    <h1>The View Dashboard</h1>
  </header>

  <!-- CONTAINER -->
  <div class="container">

    <!-- FILTROS -->
    <div class="filtros">

      <div class="filtro">
        <label>Piso</label>
        <select id="piso" onchange="render()"></select>
      </div>

      <div class="filtro">
        <label>Vista</label>
        <select id="vista" onchange="render()"></select>
      </div>

      <div class="filtro">
        <label>Frações</label>
        <div id="fractionsBox" class="checkboxGroup"></div>
      </div>

      <div class="filtro">
        <label>Concorrentes</label>
        <div id="empreBox" class="checkboxGroup"></div>
      </div>

      <div class="filtro">
        <button onclick="resetFiltros()" class="btnReset">
          Limpar Filtros
        </button>
      </div>

    </div>

    <!-- GRID -->
    <div id="grid" class="grid"></div>

  </div>

  <!-- MODAL -->
  <div id="modal" class="modal" onclick="fecharModal()">
    <div class="modal-content" onclick="event.stopPropagation()">

      <div class="modal-top">
        <h2 id="modalTitulo"></h2>
        <button onclick="fecharModal()" class="closeBtn">✕</button>
      </div>

      <div id="modalConteudo"></div>

    </div>
  </div>

  <!-- SCRIPT -->
  <script src="app.js"></script>

</body>
</html>
